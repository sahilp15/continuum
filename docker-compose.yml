services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: continuum-postgres
    environment:
      POSTGRES_USER: continuum
      POSTGRES_PASSWORD: continuum_dev_password
      POSTGRES_DB: continuum
    ports:
      - "5432:5432"
    volumes:
      - continuum-pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U continuum"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  continuum-pgdata:
